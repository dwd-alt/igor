<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор Ужасного Игоря | Выбор версии</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Courier New', 'Monaco', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,0,0,0.1) 0%, transparent 50%);
            animation: pulse 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        .menu-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid #ff4444;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(2px);
        }

        .header {
            background: linear-gradient(135deg, #8b0000, #4a0000);
            padding: 30px;
            text-align: center;
            border-bottom: 3px solid #ff4444;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '🐺';
            position: absolute;
            font-size: 100px;
            opacity: 0.1;
            right: -20px;
            top: -20px;
            pointer-events: none;
        }

        .header::after {
            content: '🎀';
            position: absolute;
            font-size: 80px;
            opacity: 0.1;
            left: -20px;
            bottom: -20px;
            pointer-events: none;
        }

        .igor-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff4444;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255,68,68,0.5);
            transition: transform 0.3s;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .igor-avatar:hover {
            transform: scale(1.05);
        }

        .header h1 {
            color: #ff6666;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .header p {
            color: #ff9999;
            font-size: 14px;
            margin-top: 10px;
        }

        .stats-badge {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 12px;
            color: #ff8888;
        }

        .versions-grid {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .versions-grid::-webkit-scrollbar {
            width: 8px;
        }

        .versions-grid::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 10px;
        }

        .versions-grid::-webkit-scrollbar-thumb {
            background: #ff4444;
            border-radius: 10px;
        }

        .version-card {
            background: linear-gradient(135deg, #1f1f1f, #151515);
            border: 1px solid #ff4444;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .version-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,68,68,0.2), transparent);
            transition: left 0.5s;
        }

        .version-card:hover::before {
            left: 100%;
        }

        .version-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255,68,68,0.4);
            border-color: #ff8888;
        }

        .version-number {
            font-size: 24px;
            font-weight: bold;
            color: #ff6666;
            margin-bottom: 10px;
        }

        .version-name {
            font-size: 18px;
            color: #ffaaaa;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .version-desc {
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .version-badge {
            display: inline-block;
            background: #ff4444;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .version-card:hover .version-badge {
            background: #ff6666;
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
        }

        .footer {
            background: #0a0a0a;
            padding: 15px;
            text-align: center;
            border-top: 1px solid #333;
            color: #666;
            font-size: 12px;
        }

        .footer span {
            color: #ff8888;
        }

        .counter {
            display: inline-block;
            background: #ff4444;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 8px;
        }

        .blood-effect {
            position: fixed;
            pointer-events: none;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 70%, rgba(255,0,0,0.05) 100%);
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="blood-effect"></div>
    <div class="menu-container">
        <div class="header">
            <img src="images/igor.png" class="igor-avatar" alt="Игорь" onerror="this.src='https://via.placeholder.com/100/ff4444/ffffff?text=🐺'">
            <h1>⚡ СИМУЛЯТОР УЖАСНОГО ИГОРЯ ⚡</h1>
            <p>Рыгорь | Срыгорь | Мегасрыгрь | Фембой | Квадробер</p>
            <div class="stats-badge">
                📊 Всего версий: <span id="versionsCount">0</span>
                👥 Сыграно раз: <span id="playCount">0</span>
            </div>
        </div>

        <div class="versions-grid" id="versionsGrid">
            <!-- Версии будут добавляться сюда -->
        </div>

        <div class="footer">
            🐺 <span>Игорь</span> меняется — меняйся и ты | Каждая версия — новая жизнь
        </div>
    </div>

    <script>
        // Счётчик игр (сохраняется в localStorage)
        let playCount = localStorage.getItem('igorPlayCount') ? parseInt(localStorage.getItem('igorPlayCount')) : 0;

        // Список всех версий
        const versions = [
            { number: "v1.0", name: "Игорь в школе", desc: "Оригинальный Игорь. Оскорбляет родню, угрожает смертью.", file: "1v.html", badge: "🐺 ОРИГИНАЛ", color: "#ff4444" },
            { number: "v2.0", name: "Забивчик жесткий", desc: "Погоня за Игорем. Сможете догнать труса?", file: "2v.html", badge: "🏃‍♂️ ЭКШН", color: "#ff8844" },
            { number: "v3.0", name: "Фембой или Гопник", desc: "Игорь выбирает свой путь. Гопник умрёт за гаражами.", file: "3v.html", badge: "🎀 ВЫБОР", color: "#ff66aa" },
            { number: "v4.0", name: "Игорь и Стринги", desc: "Конкурс 'Мисс Весна'. Сможет ли Игорь победить?", file: "4v.html", badge: "👙 НОВАЯ", color: "#ff88cc" },
            { number: "v5.0", name: "Битва за Парк", desc: "Квадроберы против собачников. Кто победит?", file: "5v.html", badge: "🐺 ЭКШН", color: "#66ff66" },
            { number: "v6.0", name: "Совместный Стрим", desc: "Игорь и Алиса становятся стримерами.", file: "6v.html", badge: "📺 НОВАЯ", color: "#aa88ff" },
            { number: "v7.0", name: "Игорь и Алиса", desc: "Первое свидание. Сможет ли Игорь признаться?", file: "7v.html", badge: "💖 РОМАНТИКА", color: "#ff88aa" },
            { number: "v8.0", name: "Новый Рыгорь", desc: "В школе появился Саша — копия старого Игоря.", file: "8v.html", badge: "👊 КОНФЛИКТ", color: "#ffaa44" },
            { number: "v9.0", name: "Косплеер", desc: "Игорь участвует в конкурсе косплея на А4.", file: "9v.html", badge: "🎭 ТВОРЧЕСТВО", color: "#44aaff" },
            { number: "v10.0", name: "Учитель Физкультуры", desc: "Игорь ведёт уроки в родной школе.", file: "10v.html", badge: "🏫 НОВАЯ", color: "#44ffaa" },
            { number: "v11.0", name: "Игорь и Родители", desc: "Мама нашла стринги. Что делать?", file: "11v.html", badge: "🏠 НОВАЯ", color: "#ffaa66" },
            { number: "v12.0", name: "Свидание (Полная)", desc: "Расширенная версия свидания с Алисой", file: "12v.html", badge: "💰 НОВАЯ", color: "#ffdd44" },
            { number: "v13.0", name: "Анимешник", desc: "Игорь становится отаку и едет в Японию.", file: "13v.html", badge: "🎌 НОВАЯ", color: "#cc88ff" },
            { number: "v14.0", name: "Бренд Стрингов", desc: "Игорь открывает свой бизнес. Станет миллионером?", file: "14v.html", badge: "💖 НОВАЯ", color: "#ff88aa" }
        ];

        // Функция обновления счётчика
        function updatePlayCount() {
            document.getElementById('playCount').innerText = playCount;
            localStorage.setItem('igorPlayCount', playCount);
        }

        // Функция добавления просмотра
        function addPlay() {
            playCount++;
            updatePlayCount();
        }

        // Отрисовка карточек
        function renderVersions() {
            const grid = document.getElementById('versionsGrid');
            grid.innerHTML = '';

            versions.forEach(version => {
                const card = document.createElement('a');
                card.className = 'version-card';
                card.href = version.file;
                card.onclick = () => addPlay();
                card.style.borderColor = version.color;
                card.innerHTML = `
                    <div class="version-number" style="color: ${version.color}">${version.number}</div>
                    <div class="version-name">${version.name}</div>
                    <div class="version-desc">${version.desc}</div>
                    <span class="version-badge" style="background: ${version.color}">${version.badge}</span>
                `;
                grid.appendChild(card);
            });

            document.getElementById('versionsCount').innerText = versions.length;
        }

        // Анимация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            renderVersions();
            updatePlayCount();

            // Эффект печати для заголовка
            const title = document.querySelector('.header h1');
            const originalText = title.innerHTML;
            title.innerHTML = '';
            let i = 0;
            function typeTitle() {
                if (i < originalText.length) {
                    title.innerHTML += originalText[i];
                    i++;
                    setTimeout(typeTitle, 50);
                }
            }
            typeTitle();
        });

        // Консоль для добавления новых версий
        console.log('🔥 ДОБАВИТЬ НОВУЮ ВЕРСИЮ:');
        console.log('addVersion({ number: "v15.0", name: "НАЗВАНИЕ", desc: "ОПИСАНИЕ", file: "15v.html", badge: "🏷️ ТЕГ", color: "#ffaa66" })');
        console.log('🎀 Всего версий: ' + versions.length);
    </script>
</body>
</html>
